services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - shelfa-data:/app/data
    environment:
      GUNICORN_WORKERS: "2"
      DATA_DIR: /app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  shelfa-data:
